<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="icon" type="image/jpeg" href="/ff4.jpg">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <article>
            <div style="font-size: 1.1rem; line-height: 1.7;">
                {{ .Content }}
            </div>
        </article>
    </div>
    <style>
        .container h2,
        .container h3,
        .container h4,
        .container h5,
        .container h6 {
            color: #d0d0d0;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .container p {
            margin-bottom: 1rem;
        }

        .container a {
            color: #f1c40f;
            text-decoration: underline;
        }

        .container a:hover {
            text-decoration: none;
        }

        .container blockquote {
            border-left: 4px solid #f1c40f;
            padding-left: 1rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: #ccc;
        }

        .container code {
            background: #2a2a2a;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
        }

        .container pre {
            background: #2a2a2a;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        .container pre code {
            background: none;
            padding: 0;
        }

        .container ul,
        .container ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .container li {
            margin-bottom: 0.5rem;
        }

        .container table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }

        .container th,
        .container td {
            border: 1px solid #444;
            padding: 0.75rem;
            text-align: left;
        }

        .container th {
            background: #2a2a2a;
            font-weight: 600;
        }

        .container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1rem 0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 1rem 0.5rem;
            }

            div[style*="display: flex"] {
                flex-direction: column;
            }

            div[style*="text-align: right"] {
                text-align: left !important;
            }
        }
    </style>
</body>

</html>
